# Migration: Add rose garden and connect to fountain
zone:
  name: Emerald Park

rooms:
  park_entrance:
    name: Park Entrance
    description: |
      A wrought-iron gate opens onto a gravel path that winds between
      ancient oak trees.
  fountain_plaza:
    name: Fountain Plaza
    description: |
      A marble fountain dominates the center of a circular plaza.
      Water arcs from the mouths of four stone fish.
  rose_garden:
    name: The Rose Garden
    description: |
      Rows of carefully tended rose bushes form a maze of color and
      fragrance. A small wooden sign reads 'Maintained by the
      Garden Society.'

exits:
  - from: park_entrance
    to: fountain_plaza
    name: "North;north;n"
    back: "South;south;s"
  - from: fountain_plaza
    to: rose_garden
    name: "Garden;garden;east;e"
    back: "Plaza;plaza;west;w"
