name: Titan
options:
  bundleIdPrefix: org.tinymux
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  GRPCSwift:
    url: https://github.com/grpc/grpc-swift-2
    from: 2.0.0
  GRPCSwiftProtobuf:
    url: https://github.com/grpc/grpc-swift-protobuf
    from: 2.0.0
  GRPCSwiftNIOTransport:
    url: https://github.com/grpc/grpc-swift-nio-transport
    from: 2.0.0

targets:
  Titan:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Titan
    dependencies:
      - package: GRPCSwift
        product: GRPCCore
      - package: GRPCSwiftProtobuf
        product: GRPCProtobuf
      - package: GRPCSwiftNIOTransport
        product: GRPCNIOTransportHTTP2Posix
    info:
      path: Titan/Info.plist
      properties:
        CFBundleDisplayName: Titan
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: org.tinymux.titan
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

  TitanMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Titan
    dependencies:
      - package: GRPCSwift
        product: GRPCCore
      - package: GRPCSwiftProtobuf
        product: GRPCProtobuf
      - package: GRPCSwiftNIOTransport
        product: GRPCNIOTransportHTTP2Posix
    info:
      path: Titan/Info.plist
      properties:
        CFBundleDisplayName: Titan
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.tinymux.titan.mac
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
