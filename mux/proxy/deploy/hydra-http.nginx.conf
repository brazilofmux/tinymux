# /etc/nginx/sites-available/hydra
#
# NGINX http block — grpc-web, WebSocket, and health check endpoints.
# Certbot manages the TLS certificate via Let's Encrypt.
#
# Install: ln -s /etc/nginx/sites-available/hydra /etc/nginx/sites-enabled/

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mud.example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — grpc-web, WebSocket, health check
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mud.example.com;

    # Let's Encrypt certificate
    ssl_certificate     /etc/letsencrypt/live/mud.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mud.example.com/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Health check ---
    # ALB/monitoring can hit /healthz directly
    location = /healthz {
        proxy_pass http://127.0.0.1:4205;
        proxy_set_header Host $host;
    }

    # --- grpc-web API ---
    # Paths: /hydra.HydraService/*
    location /hydra.HydraService/ {
        proxy_pass http://127.0.0.1:4205;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # grpc-web needs POST with large-ish bodies
        client_max_body_size 1m;

        # For Subscribe streaming (chunked transfer)
        proxy_buffering off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # --- WebSocket ---
    # For web clients using the hydra-gamesession subprotocol
    location /ws {
        proxy_pass http://127.0.0.1:4203;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket sessions are long-lived
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Default — could serve a static web client here
    location / {
        return 404;
    }
}
