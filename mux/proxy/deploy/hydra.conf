# Hydra configuration for NGINX-fronted deployment
#
# NGINX terminates TLS on the public interface.
# Hydra listens on localhost only, plaintext.

# --- Listeners (localhost only — NGINX proxies from public ports) ---
# Keep telnet on a different loopback port than NGINX's public 4201 stream
# listener to avoid bind conflicts.
listen telnet       127.0.0.1:4202
listen websocket    127.0.0.1:4203
listen grpc-web     127.0.0.1:4205

# Plaintext is safe here because NGINX handles TLS on the public side
# and Hydra only binds to loopback.
allow_plaintext yes

# --- CORS ---
# Set to your actual domain.  grpc-web requests from a web client need this.
cors_origin https://mud.example.com

# --- Database ---
database /opt/hydra/hydra.sqlite

# --- Master key ---
# Preferred: set HYDRA_MASTER_KEY in /opt/hydra/env (loaded by systemd).
# Alternative: file path (auto-generated on first run).
master_key /opt/hydra/master.key

# --- Session defaults ---
scrollback_lines            10000
session_idle_timeout        24h
detached_session_timeout    24h
link_reconnect_timeout      5m
session_token_ttl           24h

# --- Resource limits ---
max_sessions_per_account    1
max_frontdoors_per_session  3
max_links_per_session       5
max_scrollback_memory_mb    64
max_connections_per_ip      10
connect_rate_limit          5
failed_login_lockout        5
failed_login_lockout_minutes 5

# --- Logging ---
# Use "-" to log to stdout/journald via systemd
log_file -
log_level info

# --- Games ---
game "YourGame" {
    host            localhost
    port            2860
    transport       tcp
    type            local
    binary          /opt/hydra/game/bin/netmux
    workdir         /opt/hydra/game
    autostart       yes
    reconnect       yes
    retry           5s 10s 30s 60s
    charset         utf-8
    tls_required    no
}
