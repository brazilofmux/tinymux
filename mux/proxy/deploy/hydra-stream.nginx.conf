# /etc/nginx/conf.d/hydra-stream.conf
#
# NGINX stream module — TLS termination for MUD telnet connections.
# Requires: nginx-mod-stream (or nginx-full on Ubuntu/Debian).
#
# Clients connect to mud.example.com:4201 with TLS.
# NGINX terminates TLS and proxies plaintext to Hydra on localhost.
#
# NOTE: This goes in the top-level nginx.conf or a file included from
# the stream {} block, NOT inside http {}.  On Ubuntu/Debian with the
# default package layout:
#
#   1. Ensure stream module is loaded.  In /etc/nginx/nginx.conf, add
#      (outside any block, near the top):
#
#        load_module /usr/lib/nginx/modules/ngx_stream_module.so;
#
#   2. Add a stream {} block (also outside http {}):
#
#        stream {
#            include /etc/nginx/stream.d/*.conf;
#        }
#
#   3. Place this file in /etc/nginx/stream.d/hydra.conf

# Upstream: Hydra telnet listener on localhost
upstream hydra_telnet {
    server 127.0.0.1:4202;
}

# TLS-terminated MUD port
server {
    listen 4201 ssl;
    listen [::]:4201 ssl;

    # Let's Encrypt certificate (same cert as the HTTP site)
    ssl_certificate     /etc/letsencrypt/live/mud.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mud.example.com/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:MUD:10m;
    ssl_session_timeout 1h;

    # Proxy to Hydra
    proxy_pass hydra_telnet;

    # Timeouts — MUD sessions are long-lived
    proxy_timeout 24h;
    proxy_connect_timeout 10s;
}
