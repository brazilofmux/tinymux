syntax = "proto3";

package hydra;

// ---- Enums ----

// How the server should render color in output text.
// Clients specify this when opening a GameSession or Subscribe stream.
// COLOR_UNSPECIFIED (0) means "don't change" in SetPreferences, or
// "server default (TrueColor)" when used in Subscribe/ScrollBack requests.
enum ColorFormat {
    COLOR_UNSPECIFIED = 0; // proto3 default — no change / server default
    ANSI_TRUECOLOR = 1;   // ESC[38;2;R;G;Bm — for terminal clients
    ANSI_256       = 2;   // ESC[38;5;Nm — xterm-256 palette
    ANSI_16        = 3;   // ESC[31m etc. — basic 16-color
    PUA_UTF8       = 4;   // TinyMUX PUA-encoded UTF-8 — for custom renderers
    PLAIN          = 5;   // All color stripped
}

// State of a back-door link to a game server.
enum LinkState {
    LINK_UNKNOWN       = 0;
    LINK_CONNECTING    = 1;
    LINK_TLS           = 2;
    LINK_NEGOTIATING   = 3;
    LINK_LOGGING_IN    = 4;
    LINK_ACTIVE        = 5;
    LINK_RECONNECTING  = 6;
    LINK_SUSPENDED     = 7;
    LINK_DEAD          = 8;
}

// State of a Hydra session.
enum SessionState {
    SESSION_UNKNOWN  = 0;
    SESSION_LOGIN    = 1;
    SESSION_ACTIVE   = 2;
    SESSION_DETACHED = 3;
}

// Game type (local process vs remote server).
enum GameType {
    GAME_REMOTE = 0;
    GAME_LOCAL  = 1;
}

// Severity level for system notices.
enum Severity {
    SEVERITY_INFO  = 0;
    SEVERITY_WARN  = 1;
    SEVERITY_ERROR = 2;
}

// ---- Common types ----

message Empty {}

message GameInfo {
    string   name = 1;
    string   host = 2;
    uint32   port = 3;
    GameType type = 4;
    bool     autostart = 5;
}

message LinkInfo {
    int32     number = 1;          // 1-based
    string    game_name = 2;
    LinkState state = 3;
    string    character = 4;
    bool      active = 5;          // is this the active link?
    bool      gmcp_enabled = 6;
    int32     retry_count = 7;
    int64     next_retry = 8;      // unix timestamp, 0 if not reconnecting
}

message SessionInfo {
    string       session_id = 1;
    string       username = 2;
    repeated LinkInfo links = 3;
    int32        active_link = 4;     // 1-based, 0 if none
    int32        scrollback_lines = 5;
    SessionState state = 6;
    int64        created = 7;         // unix timestamp
    int64        last_activity = 8;
}

// Game text output from a back-door link.
message GameOutput {
    string text = 1;            // rendered per ColorFormat
    string source = 2;          // game name
    int64  timestamp = 3;
    int32  link_number = 4;     // 1-based
    bool   end_of_record = 5;   // prompt/end-of-record boundary marker
}

// A GMCP message (structured MUD protocol data).
// The json field is intentionally a string — GMCP payloads are
// game-defined JSON and vary by package.  Common packages like
// Char.Vitals could get typed wrappers in a future .proto revision,
// but the base representation must remain extensible.
message GmcpMessage {
    string package = 1;         // e.g. "Char.Vitals", "Room.Info"
    string json = 2;            // game-defined JSON payload
    int32  link_number = 3;     // 1-based, which link it came from
}

message StoredCredential {
    string game = 1;
    string character = 2;
    string verb = 3;
    string name = 4;
    bool   auto_login = 5;
    // secret is NEVER returned — write-only via AddCredential
}

message ProcessInfo {
    string game_name = 1;
    bool   running = 2;
    int32  pid = 3;
    int64  started = 4;         // unix timestamp
}

// ---- Authentication ----
//
// Authenticate returns a session_id token.  All subsequent RPCs
// should pass this token via the "authorization" gRPC metadata header
// instead of per-message session_id fields.  Per-message session_id
// fields are supported as a fallback but the metadata approach is
// preferred (enables interceptor-based auth).

message AuthRequest {
    string username = 1;
    string password = 2;
}

message AuthResponse {
    bool   success = 1;
    string session_id = 2;      // use as "authorization" metadata value
    string error = 3;
}

message CreateAccountRequest {
    string username = 1;
    string password = 2;
}

message CreateAccountResponse {
    bool   success = 1;
    string session_id = 2;      // auto-login after creation
    string error = 3;
}

// ---- Session operations ----

message SessionRequest {
    string session_id = 1;          // fallback if not using metadata auth
    ColorFormat color_format = 2;   // for Subscribe: how to render output (default TrueColor)
    uint32 terminal_width = 3;      // for Subscribe: viewport columns (0 = use default 80)
    uint32 terminal_height = 4;     // for Subscribe: viewport rows (0 = use default 24)
}

message ConnectRequest {
    string session_id = 1;
    string game_name = 2;
}

message ConnectResponse {
    bool   success = 1;
    int32  link_number = 2;     // 1-based
    string error = 3;
}

message SwitchRequest {
    string session_id = 1;
    int32  link_number = 2;     // 1-based
}

message SwitchResponse {
    bool   success = 1;
    string error = 2;
}

message DisconnectRequest {
    string session_id = 1;
    int32  link_number = 2;     // 1-based
}

message DisconnectResponse {
    bool   success = 1;
    string error = 2;
}

// ---- Bidirectional I/O ----
//
// GameSession is the primary I/O channel.  The client opens a bidi
// stream and sends ClientMessage (input lines, commands).  The server
// pushes ServerMessage (game output, GMCP, system notices).
// This eliminates per-line round-trips and maps to a persistent
// connection model.

// (GameSessionRequest removed — use SetPreferences as first ClientMessage instead.)

// Client → Server messages on the bidi stream.
message ClientMessage {
    oneof payload {
        string input_line = 1;          // text input to active link
        GmcpClientMessage gmcp = 2;    // GMCP to active link
        PingMessage ping = 3;          // application-level keepalive
        SetPreferences preferences = 4; // color/terminal negotiation
    }
}

// Client preferences — send as the first ClientMessage on a GameSession
// stream, and again whenever preferences change (e.g., window resize).
message SetPreferences {
    ColorFormat color_format = 1;       // how to render output text
    uint32 terminal_width = 2;          // client viewport columns (0 = use default)
    uint32 terminal_height = 3;         // client viewport rows (0 = use default)
    string terminal_type = 4;           // e.g. "xterm-256color" (empty = use default)
    string session_id = 5;             // WS GameSession first-message auth (ignored by gRPC)
}

message GmcpClientMessage {
    string package = 1;
    string json = 2;
}

message PingMessage {
    int64 client_timestamp = 1;     // client's unix millis for RTT calc
}

// Server → Client messages on the bidi stream.
message ServerMessage {
    oneof payload {
        GameOutput game_output = 1;     // text from a game link
        GmcpMessage gmcp = 2;          // structured GMCP data
        SystemNotice notice = 3;        // Hydra system messages
        PongMessage pong = 4;          // keepalive response
        LinkEvent link_event = 5;      // link state changes
    }
}

message SystemNotice {
    string   text = 1;                  // e.g. "[Shangrila: connected]"
    Severity severity = 2;
}

message PongMessage {
    int64 client_timestamp = 1;         // echoed from ping
    int64 server_timestamp = 2;         // server's unix millis
}

message LinkEvent {
    int32     link_number = 1;
    string    game_name = 2;
    LinkState old_state = 3;
    LinkState new_state = 4;
}

// ---- Legacy unary I/O (kept for simple clients) ----

message InputRequest {
    string session_id = 1;
    string line = 2;
}

message InputResponse {
    bool   success = 1;
    string error = 2;
}

// ---- Scroll-back ----

message ScrollBackRequest {
    string session_id = 1;
    int32  max_lines = 2;           // 0 = all
    ColorFormat color_format = 3;   // how to render historical lines
}

message ScrollBackResponse {
    repeated GameOutput lines = 1;
}

// ---- Credentials ----

message AddCredentialRequest {
    string session_id = 1;
    string game = 2;
    string character = 3;
    string verb = 4;
    string name = 5;
    string secret = 6;              // encrypted at rest, never returned
}

message AddCredentialResponse {
    bool   success = 1;
    string error = 2;
}

message DeleteCredentialRequest {
    string session_id = 1;
    string game = 2;
    string character = 3;           // empty = delete all for game
}

message DeleteCredentialResponse {
    bool   success = 1;
    string error = 2;
}

message ListCredentialsRequest {
    string session_id = 1;
}

message ListCredentialsResponse {
    repeated StoredCredential credentials = 1;
}

// ---- Process management ----

message GameRequest {
    string game_name = 1;
}

message GameResponse {
    bool   success = 1;
    string error = 2;
    int32  pid = 3;
}

message GameStatusRequest {
    string game_name = 1;           // empty = all games
}

message GameStatusResponse {
    repeated ProcessInfo processes = 1;
}

// ---- Aggregate messages ----

message GameList {
    repeated GameInfo games = 1;
}

message LinkList {
    repeated LinkInfo links = 1;
}

// ---- GMCP subscription ----

message GmcpSubscribeRequest {
    string session_id = 1;
    repeated string packages = 2;   // filter by package prefix, empty = all
}

// ---- Service definition ----

service HydraService {
    // Authentication & account management
    rpc Authenticate(AuthRequest) returns (AuthResponse);
    rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);

    // Session lifecycle
    rpc GetSession(SessionRequest) returns (SessionInfo);
    rpc DetachSession(SessionRequest) returns (Empty);
    rpc DestroySession(SessionRequest) returns (Empty);
    rpc Ping(SessionRequest) returns (Empty);

    // Game catalog
    rpc ListGames(Empty) returns (GameList);

    // Link management
    rpc Connect(ConnectRequest) returns (ConnectResponse);
    rpc SwitchLink(SwitchRequest) returns (SwitchResponse);
    rpc DisconnectLink(DisconnectRequest) returns (DisconnectResponse);
    rpc ListLinks(SessionRequest) returns (LinkList);

    // Bidirectional I/O — the primary channel for interactive clients.
    // Client sends input lines + GMCP + pings; server pushes game output
    // + GMCP + system notices + link events + pongs.
    rpc GameSession(stream ClientMessage) returns (stream ServerMessage);

    // Legacy unary I/O (for simple/scripted clients)
    rpc SendInput(InputRequest) returns (InputResponse);
    rpc Subscribe(SessionRequest) returns (stream GameOutput);

    // GMCP subscription — structured MUD protocol data as a separate stream.
    // For clients that want GMCP without the text output, or vice versa.
    rpc SubscribeGmcp(GmcpSubscribeRequest) returns (stream GmcpMessage);

    // Scroll-back history
    rpc GetScrollBack(ScrollBackRequest) returns (ScrollBackResponse);

    // Credential management
    rpc AddCredential(AddCredentialRequest) returns (AddCredentialResponse);
    rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse);
    rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);

    // Process management (local games only)
    rpc StartGame(GameRequest) returns (GameResponse);
    rpc StopGame(GameRequest) returns (GameResponse);
    rpc RestartGame(GameRequest) returns (GameResponse);
    rpc GetGameStatus(GameStatusRequest) returns (GameStatusResponse);
}
