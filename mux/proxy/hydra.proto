syntax = "proto3";

package hydra;

// ---- Common types ----

message Empty {}

message GameInfo {
    string name = 1;
    string host = 2;
    uint32 port = 3;
    string type = 4;            // "local" or "remote"
    bool   autostart = 5;
}

message LinkInfo {
    int32  number = 1;          // 1-based
    string game_name = 2;
    string state = 3;           // "connecting", "active", "reconnecting", "dead", etc.
    string character = 4;
    bool   active = 5;          // is this the active link?
    bool   gmcp_enabled = 6;
    int32  retry_count = 7;
    int64  next_retry = 8;      // unix timestamp, 0 if not reconnecting
}

message SessionInfo {
    string session_id = 1;
    string username = 2;
    repeated LinkInfo links = 3;
    int32  active_link = 4;     // 1-based, 0 if none
    int32  scrollback_lines = 5;
    string state = 6;           // "active", "detached"
    int64  created = 7;         // unix timestamp
    int64  last_activity = 8;
}

message GameOutput {
    string text = 1;            // ANSI 256-color rendered
    string source = 2;          // game name
    int64  timestamp = 3;
    int32  link_number = 4;     // 1-based
}

message StoredCredential {
    string game = 1;
    string character = 2;
    string verb = 3;
    string name = 4;
    bool   auto_login = 5;
    // secret is NEVER returned — write-only via AddCredential
}

message ProcessInfo {
    string game_name = 1;
    bool   running = 2;
    int32  pid = 3;
    int64  started = 4;         // unix timestamp
}

// ---- Authentication ----

message AuthRequest {
    string username = 1;
    string password = 2;
}

message AuthResponse {
    bool   success = 1;
    string session_id = 2;      // persistId (stable across restarts)
    string error = 3;
}

// ---- Session operations ----

message SessionRequest {
    string session_id = 1;
}

message ConnectRequest {
    string session_id = 1;
    string game_name = 2;
}

message ConnectResponse {
    bool   success = 1;
    int32  link_number = 2;     // 1-based
    string error = 3;
}

message SwitchRequest {
    string session_id = 1;
    int32  link_number = 2;     // 1-based
}

message SwitchResponse {
    bool   success = 1;
    string error = 2;
}

message DisconnectRequest {
    string session_id = 1;
    int32  link_number = 2;     // 1-based
}

message DisconnectResponse {
    bool   success = 1;
    string error = 2;
}

message InputRequest {
    string session_id = 1;
    string line = 2;
}

message InputResponse {
    bool   success = 1;
    string error = 2;
}

// ---- Scroll-back ----

message ScrollBackRequest {
    string session_id = 1;
    int32  max_lines = 2;       // 0 = all
}

message ScrollBackResponse {
    repeated GameOutput lines = 1;
}

// ---- Credentials ----

message AddCredentialRequest {
    string session_id = 1;
    string game = 2;
    string character = 3;
    string verb = 4;
    string name = 5;
    string secret = 6;          // encrypted at rest, never returned
}

message AddCredentialResponse {
    bool   success = 1;
    string error = 2;
}

message DeleteCredentialRequest {
    string session_id = 1;
    string game = 2;
    string character = 3;       // empty = delete all for game
}

message DeleteCredentialResponse {
    bool   success = 1;
    string error = 2;
}

message ListCredentialsRequest {
    string session_id = 1;
}

message ListCredentialsResponse {
    repeated StoredCredential credentials = 1;
}

// ---- Process management ----

message GameRequest {
    string game_name = 1;
}

message GameResponse {
    bool   success = 1;
    string error = 2;
    int32  pid = 3;
}

message GameStatusRequest {
    string game_name = 1;       // empty = all games
}

message GameStatusResponse {
    repeated ProcessInfo processes = 1;
}

// ---- Aggregate messages ----

message GameList {
    repeated GameInfo games = 1;
}

message LinkList {
    repeated LinkInfo links = 1;
}

// ---- Service definition ----

service HydraService {
    // Authentication
    rpc Authenticate(AuthRequest) returns (AuthResponse);

    // Session lifecycle
    rpc GetSession(SessionRequest) returns (SessionInfo);
    rpc DetachSession(SessionRequest) returns (Empty);
    rpc DestroySession(SessionRequest) returns (Empty);

    // Game catalog
    rpc ListGames(Empty) returns (GameList);

    // Link management
    rpc Connect(ConnectRequest) returns (ConnectResponse);
    rpc SwitchLink(SwitchRequest) returns (SwitchResponse);
    rpc DisconnectLink(DisconnectRequest) returns (DisconnectResponse);
    rpc ListLinks(SessionRequest) returns (LinkList);

    // I/O
    rpc SendInput(InputRequest) returns (InputResponse);
    rpc Subscribe(SessionRequest) returns (stream GameOutput);

    // Scroll-back history
    rpc GetScrollBack(ScrollBackRequest) returns (ScrollBackResponse);

    // Credential management
    rpc AddCredential(AddCredentialRequest) returns (AddCredentialResponse);
    rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse);
    rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);

    // Process management (local games only)
    rpc StartGame(GameRequest) returns (GameResponse);
    rpc StopGame(GameRequest) returns (GameResponse);
    rpc RestartGame(GameRequest) returns (GameResponse);
    rpc GetGameStatus(GameStatusRequest) returns (GameStatusResponse);
}
